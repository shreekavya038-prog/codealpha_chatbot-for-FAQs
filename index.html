<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FAQ Chatbot</title>
<style>
body { font-family: Arial; background:#f3f4f6; padding:40px; }
.box { max-width:700px; margin:auto; background:white; padding:20px; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.1); }
textarea, input { width:100%; padding:12px; font-size:16px; box-sizing:border-box; }
button { margin-top:10px; padding:12px 20px; background:#4f46e5; color:white; border:none; border-radius:8px; cursor:pointer; }
#answer { margin-top:20px; padding:15px; background:#eef2ff; border-radius:8px; min-height:30px; }
</style>
</head>
<body>
<div class="box">
<h1>🤖 FAQ Chatbot</h1>
<input id="question" placeholder="Ask a question (e.g. What is Python?)" />
<button onclick="sendQuestion()">Send</button>
<div id="answer"></div>
</div>

<script>
async function sendQuestion() {
    const q = document.getElementById('question').value.trim();
    if (!q) return;
    document.getElementById('answer').textContent = "Loading...";
    try {
        const res = await fetch('/ask', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({question: q})
        });
        const data = await res.json();
        document.getElementById('answer').textContent = data.answer;
    } catch (e) {
        document.getElementById('answer').textContent = "Error: " + e;
    }
}
</script>
</body>
</html>
